<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finca La Bonita — Iniciar Sesión</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="img/logo-finca.png">
</head>
<body class="login-page-body">

  <main class="login-page-full">

    <!-- TOP BAR -->
    <header class="login-topbar">
      <div class="login-topbar-side"></div>

      <a href="index.html" class="login-topbar-brand" aria-label="Volver al inicio">
        <!-- CAMBIA ESTA RUTA SI TU LOGO ESTÁ EN OTRA UBICACIÓN -->
        <img src="img/logo-finca.png" alt="Finca La Bonita" />
      </a>

      <div class="login-topbar-actions">
        <a href="index.html" class="login-back-btn">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M15 18L9 12L15 6"/>
          </svg>
          <span>Regresar</span>
        </a>
      </div>
    </header>

    <!-- HERO -->
    <section class="login-hero-section">

      <div class="login-hero-overlay"></div>

      <div class="login-card-wrap">
        <div class="login-glass-card">

          <div class="login-card-brand">
            <h1>FINCA<br>LA BONITA</h1>
            <div class="login-brand-divider">
              <span></span>
              <strong>CAFÉ DE ORIGEN</strong>
              <span></span>
            </div>
          </div>

          <div class="login-card-header">
            <span class="login-card-mini-icon">◌</span>
            <h2>Bienvenido</h2>
            <p>
              Inicia sesión para acceder al sistema<br />
              de gestión de Finca La Bonita
            </p>
          </div>

          <form class="login-form" action="#" method="post">

            <div class="login-field">
              <label for="correo">Correo electrónico</label>

              <div class="login-input-wrap">
                <span class="login-input-icon">
                  <svg viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                    <path d="M3 7L12 13L21 7"></path>
                  </svg>
                </span>

                <input
                  type="email"
                  id="correo"
                  name="correo"
                  placeholder="Ingresa tu correo electrónico"
                />
              </div>
            </div>

            <div class="login-field">
              <label for="password">Contraseña</label>

              <div class="login-input-wrap">
                <span class="login-input-icon">
                  <svg viewBox="0 0 24 24" fill="none">
                    <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                    <path d="M8 11V8a4 4 0 118 0v3"></path>
                    <path d="M12 15v2"></path>
                  </svg>
                </span>

                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Ingresa tu contraseña"
                />

                <button type="button" class="login-password-toggle" id="togglePassword" aria-label="Mostrar u ocultar contraseña">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="login-options-row">
              <label class="login-check">
                <input type="checkbox" name="remember" />
                <span class="login-check-box"></span>
                <span>Recordarme</span>
              </label>
            </div>

            <button type="button" class="login-submit-btn" onclick="window.location.href='http://localhost:8080/panel.html'">
              Iniciar Sesión
            </button>

            <div class="login-card-footer">
              <span>¿No tienes una cuenta?</span>
              <a href="#">Contacta al administrador</a>
            </div>

          </form>
        </div>
      </div>
    </section>
  </main>

  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    if (togglePassword && passwordInput) {
      togglePassword.addEventListener('click', () => {
        const currentType = passwordInput.getAttribute('type');
        passwordInput.setAttribute(
          'type',
          currentType === 'password' ? 'text' : 'password'
        );
      });
    }
  </script>

</body>
</html>
